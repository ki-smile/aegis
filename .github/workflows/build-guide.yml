name: Build and validate

on:
  pull_request:
    paths:
      - 'docs/guide/*.md'
      - 'templates/**'
      - 'scripts/**'
      - '_layouts/**'
      - 'package.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - run: npm ci

      - name: Build guide and forms
        run: |
          node scripts/build-guide.js
          node scripts/build-forms.js

      - name: Validate build
        run: node scripts/validate-build.js
